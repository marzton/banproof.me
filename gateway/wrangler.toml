name                = "banproof-core"
main                = "src/index.ts"
compatibility_date  = "2026-04-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"
USE_MOCK    = "true"

# ── Secrets (never put plaintext values here) ─────────────────
# Upload each secret with:
#   wrangler secret put HF_API_TOKEN    --config gateway/wrangler.toml
#   wrangler secret put ODDS_API_KEY    --config gateway/wrangler.toml
#   wrangler secret put DISCORD_WEBHOOK --config gateway/wrangler.toml
#
# For local dev: copy gateway/.dev.vars.example → gateway/.dev.vars
# and fill in values (file is git-ignored via .gitignore).
#
# Key generation links:
#   HF_API_TOKEN    → https://huggingface.co/settings/tokens
#   ODDS_API_KEY    → https://the-odds-api.com/#get-access
#   DISCORD_WEBHOOK → https://discord.com → Server Settings → Integrations → Webhooks

[[routes]]
pattern   = "banproof.me/api/*"
zone_name = "banproof.me"

[[routes]]
pattern   = "banproof.me/admin/*"
zone_name = "banproof.me"

[[routes]]
pattern   = "rmarston.com/api/*"
zone_name = "rmarston.com"

[[routes]]
pattern   = "rmarston.com/admin/*"
zone_name = "rmarston.com"

[observability]
enabled = true

# ── Cloudflare Access (Zero-Edge SSO) ─────────────────────────
# CF_ZERO_EDGE_PUBLIC_KEY is a secret; set it with:
# `wrangler secret put CF_ZERO_EDGE_PUBLIC_KEY --config gateway/wrangler.toml`
[vars]
CF_ACCESS_AUDIENCE = "18f2fecc663c66d5de8fd7b6c08def28b0496216669af44abf51ac221b6b40e5"

# ── Production environment ────────────────────────────────────
[env.production]
[env.production.vars]
CF_ACCESS_AUDIENCE = "18f2fecc663c66d5de8fd7b6c08def28b0496216669af44abf51ac221b6b40e5"

# ── Development environment (mock SSO for local testing) ──────
[env.development]
[env.development.vars]
CF_ACCESS_AUDIENCE   = "development"
TRUSTED_ADMIN_IPS    = "127.0.0.1,::1,100.100.100.1,100.200.200.2"

# ── D1 Database (binding: DB) ─────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "bp-core-prod"
database_id   = "54e1a408-4b81-4ca5-b6a4-c2314dc0cf46"

# ── KV Namespaces ─────────────────────────────────────────────
[[kv_namespaces]]
binding = "CACHE"
id      = "af8eb071fce34b5eafbdeb1badd93876"

[[kv_namespaces]]
binding = "INFRA_SECRETS"
id      = "b9824d3280c54573a24137c7e7143b33"

# ── R2 Object Storage (binding: STORAGE) ─────────────────────
# Stores workflow results, audit snapshots, and uploaded assets.
# Create the bucket first (if not already provisioned):
#   wrangler r2 bucket create f77de112d2019e5456a3198a8bb50bd2
[[r2_buckets]]
binding     = "STORAGE"
bucket_name = "f77de112d2019e5456a3198a8bb50bd2"

# ── Cloudflare Workflows (binding: ENGINE) ────────────────────
[[workflows]]
binding    = "ENGINE"
name       = "banproof-engine"
class_name = "BanproofEngine"

# ── Cloudflare AI (binding: AI) ───────────────────────────────
[ai]
binding = "AI"

# ── Service Bindings ──────────────────────────────────────────
# Zero-latency internal call to the SaaS customer workflow worker.
# `wrangler secret put CF_WORKFLOW_TOKEN` if the downstream worker
# enforces CF Access service tokens.
[[services]]
binding = "WORKFLOW"
service = "saas-admin-template-customer-workflow"

[[services]]
binding = "EMAIL_ROUTER"
service = "banproof-email-router"

# ── Queue Producer (binding: QUEUE) ───────────────────────────
# Enqueue background jobs for the goldshore-jobs consumer pipeline.
# Create the queue first:
#   wrangler queues create goldshore-jobs
[[queues.producers]]
binding = "QUEUE"
queue   = "goldshore-jobs"

# ── Queue Consumer ────────────────────────────────────────────
# This same worker processes messages from goldshore-jobs.
# Tune max_batch_size / max_batch_timeout to taste.
[[queues.consumers]]
queue             = "goldshore-jobs"
max_batch_size    = 10
max_batch_timeout = 30

# ── Non-secret vars (production defaults) ────────────────────
[vars]
ENVIRONMENT = "production"
USE_MOCK    = "true"
# Flip USE_MOCK to "false" only after manual UI verification on mobile.
# JWT_SECRET must be set via: wrangler secret put JWT_SECRET

# ── Development environment ───────────────────────────────────
# NOTE: Dev and staging share the production D1 database for now.
# This is safe because USE_MOCK=true means no real API calls are made.
# Create separate D1 instances when ready to test with real data.
[env.development]
vars = { ENVIRONMENT = "development", USE_MOCK = "true" }

[[env.development.d1_databases]]
binding       = "DB"
database_name = "bp-core-prod"
database_id   = "54e1a408-4b81-4ca5-b6a4-c2314dc0cf46"

[[env.development.kv_namespaces]]
binding = "CACHE"
id      = "af8eb071fce34b5eafbdeb1badd93876"

[[env.development.kv_namespaces]]
binding = "INFRA_SECRETS"
id      = "b9824d3280c54573a24137c7e7143b33"

[[env.development.r2_buckets]]
binding     = "STORAGE"
bucket_name = "f77de112d2019e5456a3198a8bb50bd2"

[[env.development.workflows]]
binding    = "ENGINE"
name       = "banproof-engine"
class_name = "BanproofEngine"

[env.development.ai]
binding = "AI"

[[env.development.services]]
binding = "WORKFLOW"
service = "saas-admin-template-customer-workflow"

[[env.development.services]]
binding = "EMAIL_ROUTER"
service = "banproof-email-router"

[[env.development.queues.producers]]
binding = "QUEUE"
queue   = "goldshore-jobs"

[[env.development.queues.consumers]]
queue             = "goldshore-jobs"
max_batch_size    = 10
max_batch_timeout = 30

# ── Staging environment ───────────────────────────────────────
[env.staging]
vars = { ENVIRONMENT = "staging", USE_MOCK = "true" }

[[env.staging.routes]]
pattern   = "staging-api.banproof.me/api/*"
zone_name = "banproof.me"

[[env.staging.d1_databases]]
binding       = "DB"
database_name = "bp-core-prod"
database_id   = "54e1a408-4b81-4ca5-b6a4-c2314dc0cf46"

[[env.staging.kv_namespaces]]
binding = "CACHE"
id      = "af8eb071fce34b5eafbdeb1badd93876"

[[env.staging.kv_namespaces]]
binding = "INFRA_SECRETS"
id      = "b9824d3280c54573a24137c7e7143b33"

[[env.staging.r2_buckets]]
binding     = "STORAGE"
bucket_name = "f77de112d2019e5456a3198a8bb50bd2"

[[env.staging.workflows]]
binding    = "ENGINE"
name       = "banproof-engine"
class_name = "BanproofEngine"

[env.staging.ai]
binding = "AI"

[[env.staging.services]]
binding = "WORKFLOW"
service = "saas-admin-template-customer-workflow"

[[env.staging.services]]
binding = "EMAIL_ROUTER"
service = "banproof-email-router"

[[env.staging.queues.producers]]
binding = "QUEUE"
queue   = "goldshore-jobs"

[[env.staging.queues.consumers]]
queue             = "goldshore-jobs"
max_batch_size    = 10
max_batch_timeout = 30
